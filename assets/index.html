<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Heebo:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>STATS PREVIEW CARD COMPONENT</title>
</head>
<body>
    <main class="content">
        <section class="cards-component">
            <article class="card-component">
                
                <div class="card-info">
                    <h1 class="title">Get <span class="other-color">insights</span> that help your business grow.</h1>
                    <p class="about">Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>
                    <div class="stats">
                        <div class="stat">
                            <span class="count-companies count">10K+</span>
                            <span class="companies">Companies</span>
                        </div>
                        <div class="stat">
                            <span class="count-templates count">314</span>
                            <span class="templates">Templates</span>
                        </div>
                        <div class="stat">
                            <span class="count-queries count">12M+</span>
                            <span class="queries">Queries</span>
                        </div>
                    </div>
                </div>
                <div class="card-image">
                    <img src="img/image-header-desktop.jpg" alt="Imgen de personas en un escritorio con computadoras">
                </div>
            </article>
        </section>
    </main>
</body>
</html>
